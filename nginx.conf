# ATHENA reverse proxy — production (Phase 5, W1).
#
# Terminates TLS, sets security headers, rate-limits, and routes:
#   /            -> web  (Next.js frontend, :3000)
#   /api/        -> api  (FastAPI, :8000)
#   /health      -> api  (public liveness only)
# Operational surfaces (/metrics, /health/full, /pilot/status) are NOT
# exposed publicly here — scrape them from inside the ops network
# (SECURITY_HARDENING A05). Works behind Cloudflare (real-IP block below).

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;                 # do not advertise the nginx version

    # --- logging (JSON, ships to the log aggregator) -----------------------
    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"request_id":"$upstream_http_x_request_id",'
        '"rt":$request_time'
    '}';
    access_log /var/log/nginx/access.log json;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 2m;           # decision payloads are small; cap uploads

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml image/svg+xml;
    gzip_min_length 512;

    # --- rate limiting -----------------------------------------------------
    # App-layer limits also exist (RateLimitMiddleware); this is defence in
    # depth at the edge. Auth endpoints get a tighter bucket.
    limit_req_zone  $binary_remote_addr zone=api_zone:10m  rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=auth_zone:10m rate=2r/s;
    limit_req_status 429;

    # --- Cloudflare real client IP (uncomment when fronted by Cloudflare) ---
    # set_real_ip_from 173.245.48.0/20;   # ... full CF range list ...
    # real_ip_header CF-Connecting-IP;

    upstream athena_api { server api:8000; keepalive 32; }
    upstream athena_web { server web:3000; keepalive 32; }

    # --- HTTP: ACME challenge + redirect to HTTPS --------------------------
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;       # certbot webroot (Let's Encrypt)
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS: the application --------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # Let's Encrypt certificates (mounted from the certbot volume).
        ssl_certificate     /etc/letsencrypt/live/athena/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/athena/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # --- security headers (SECURITY_HARDENING) -------------------------
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

        # --- public liveness ------------------------------------------------
        location = /health {
            proxy_pass http://athena_api;
            access_log off;
        }

        # --- explicitly deny operational surfaces from the public edge ------
        location = /metrics       { return 404; }
        location = /health/full   { return 404; }
        location = /pilot/status  { return 404; }

        # --- API ------------------------------------------------------------
        location /api/v1/auth/ {
            limit_req zone=auth_zone burst=10 nodelay;
            proxy_pass http://athena_api;
            include /etc/nginx/proxy_common.conf;
        }
        location /api/ {
            limit_req zone=api_zone burst=40 nodelay;
            proxy_pass http://athena_api;
            include /etc/nginx/proxy_common.conf;
        }

        # --- frontend -------------------------------------------------------
        location / {
            proxy_pass http://athena_web;
            include /etc/nginx/proxy_common.conf;
        }
    }
}
