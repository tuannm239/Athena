# ATHENA — production compose (Phase 5, W1).
#
# Reference production wiring: Nginx (TLS edge) → web + api → PostgreSQL,
# Redis, plus the observability stack (Prometheus, Grafana, Alertmanager).
# Datastores are NOT published to the host — only Nginx (80/443) is public.
# All secrets come from .env.production (see .env.production.example); this
# file contains no credentials.
#
# Validate:  docker compose -f docker-compose.prod.yml --env-file .env.production config
# Deploy:    docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

x-logging: &default-logging
  driver: json-file
  options: { max-size: "10m", max-file: "5" }   # log rotation (W1)

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [api, web]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ops/nginx/proxy_common.conf:/etc/nginx/proxy_common.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    logging: *default-logging

  # Certbot obtains/renews Let's Encrypt certs into the shared volume.
  # First issue:  docker compose -f docker-compose.prod.yml run --rm certbot \
  #   certonly --webroot -w /var/www/certbot -d $${ATHENA_DOMAIN} \
  #   --cert-name athena --agree-tos -m $${LETSENCRYPT_EMAIL} --non-interactive
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'
    restart: unless-stopped
    logging: *default-logging

  api:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: athena-api:${ATHENA_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: [.env.production]
    environment:
      ATHENA_ENV: production
      DATABASE_URL: postgresql+psycopg://athena:${POSTGRES_PASSWORD}@db:5432/athena
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DUCKDB_DIR: /app/data/snapshots
      ATHENA_PILOT_MODE: ${ATHENA_PILOT_MODE:-true}
    volumes:
      - snapshots:/app/data/snapshots
      - pilot-reports:/app/data/pilot-reports
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    expose: ["8000"]
    logging: *default-logging

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: athena-web:${ATHENA_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ATHENA_API_URL: http://api:8000
    depends_on: [api]
    expose: ["3000"]
    logging: *default-logging

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: athena
    command: >-
      postgres -c wal_level=replica -c archive_mode=on
      -c archive_command='test ! -f /backups/wal/%f && cp %p /backups/wal/%f'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - db-backups:/backups
    expose: ["5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athena"]
      interval: 10s
      timeout: 3s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--save", "", "--appendonly", "no"]
    expose: ["6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    logging: *default-logging

  # PostgreSQL exporter — standard metrics + custom domain-state queries
  # (Decision/Data pipeline, KG, Feature Store gauges). Read-only.
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://athena:${POSTGRES_PASSWORD}@db:5432/athena?sslmode=disable
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/pg_exporter/queries.yaml
    volumes:
      - ./ops/postgres_exporter/queries.yaml:/etc/pg_exporter/queries.yaml:ro
    depends_on:
      db: { condition: service_healthy }
    expose: ["9187"]
    logging: *default-logging

  # Redis exporter — cache hit/miss, memory, connected clients, latency.
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis: { condition: service_healthy }
    expose: ["9121"]
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    volumes:
      - ./ops/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    depends_on: [api]
    expose: ["9090"]        # ops network only; not published to the host
    logging: *default-logging

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    volumes:
      - ./ops/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    expose: ["9093"]
    depends_on: [prometheus]
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on: [prometheus]
    expose: ["3000"]
    logging: *default-logging

volumes:
  pgdata:
  db-backups:
  snapshots:
  pilot-reports:
  prometheus-data:
  grafana-data:
  certbot-certs:
  certbot-webroot:
